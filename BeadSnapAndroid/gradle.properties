# Project-wide Gradle settings.

# Give the Gradle daemon enough heap for Compose + R8.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Run independent subprojects in parallel.
org.gradle.parallel=true

# REQUIRED: this project uses AndroidX (Jetpack) libraries throughout.
# Without this flag, :app cannot configure, which surfaces as the misleading
# "Task 'prepareKotlinBuildScriptModel' not found in project ':app'" sync error.
android.useAndroidX=true

# Kotlin code style for the IDE.
kotlin.code.style=official

# Each module gets its own R class (smaller, faster builds). Default in modern AGP.
android.nonTransitiveRClass=true
